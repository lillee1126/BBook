spring:
  application:
    name: bbook-daily-sharing-system

  mongodb:
    host: localhost
    port: 27017
    database: BBook
  jackson:
    time-zone: Asia/Shanghai

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

bbook:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  init:
    enabled: true